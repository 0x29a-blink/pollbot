name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend (typecheck + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Skip postinstall: it downloads Chromium and runs a full build, which is
      # unnecessary for typechecking and unit tests.
      - name: Install dependencies
        run: npm ci --ignore-scripts
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Unit tests
        run: npm test
        env:
          # The Supabase client is constructed at import time and requires a
          # non-empty URL/key. The unit tests are pure (no network), so dummy
          # values are sufficient to let the module load.
          SUPABASE_URL: https://example.supabase.co
          SUPABASE_KEY: dummy-key-for-tests

  dashboard:
    name: Dashboard (typecheck + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: dashboard
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: dashboard/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Typecheck
        run: npx tsc -b --noEmit
      - name: Lint
        run: npm run lint
        continue-on-error: true
      - name: Build
        run: npm run build
